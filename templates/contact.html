{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow p-4">

                <h2 class="mb-4">Contact Us</h2>

                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-success">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="POST">

                    <input type="text"
                           name="name"
                           class="form-control mb-3"
                           placeholder="Your Name"
                           required>

                    <input type="email"
                           name="email"
                           class="form-control mb-3"
                           placeholder="Email"
                           required>

                    <input type="text"
                           name="phone"
                           class="form-control mb-3"
                           placeholder="Phone Number">

                    <input type="text"
                           name="subject"
                           class="form-control mb-3"
                           placeholder="Subject">

                    <textarea name="message"
                              class="form-control mb-3"
                              rows="5"
                              placeholder="Your Message"
                              required></textarea>

                    <button class="btn btn-primary">
                        Send Message
                    </button>

                </form>
                <iframe
                src="YOUR_GOOGLE_MAP_LINK"
                width="100%"
                height="350"
                style="border:0;"
                allowfullscreen>
                </iframe>
            </div>

        </div>

    </div>

</div>

{% endblock %}
