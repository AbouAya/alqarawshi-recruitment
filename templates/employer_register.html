{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow-lg p-5">

<h2 class="text-center mb-4">

Employer Registration

</h2>

<form method="POST">

<div class="mb-3">

<label>Company Name</label>

<input
type="text"
name="company_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Contact Person</label>

<input
type="text"
name="contact_person"
class="form-control">

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control">

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control">

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control">

</div>

<button class="btn btn-primary w-100">

Create Employer Account

</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
